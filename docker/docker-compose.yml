name: code-and-spell

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_and_spell
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d code_and_spell"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - code-spell-network

  backend:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code_and_spell
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 3001
      CLIENT_URL: http://localhost
      SENTRY_DSN_SERVER: ${SENTRY_DSN_SERVER:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"
    networks:
      - code-spell-network

  frontend:
    build:
      context: ..
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - code-spell-network

networks:
  code-spell-network:
    driver: bridge

volumes:
  postgres_data:
