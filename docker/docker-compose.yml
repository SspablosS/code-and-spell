name: code-and-spell

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_and_spell
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d code_and_spell"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - code-spell-network

  backend:
    build: ../server
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - code-spell-network

  frontend:
    build: ../client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - code-spell-network

networks:
  code-spell-network:
    driver: bridge

volumes:
  postgres_data:
