name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Lint server (TypeScript check)
        working-directory: server
        run: npm run lint

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Build server
        working-directory: server
        run: npm run build

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install deps
        working-directory: client
        run: npm ci

      - name: Run frontend tests
        working-directory: client
        run: npm test -- --run

  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Run backend tests
        working-directory: server
        run: npm test
