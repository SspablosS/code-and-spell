name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Lint server (TypeScript check)
        working-directory: server
        run: npm run lint

      - name: Build client
        working-directory: client
        run: |
          npm install --include=dev
          npm run build

      - name: Build server
        working-directory: server
        run: npm run build

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install deps
        working-directory: client
        run: npm ci

      - name: Run frontend tests
        working-directory: client
        run: npm test -- --run

  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: code_and_spell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install deps
        working-directory: server
        run: npm ci

      - name: Run migrations and seed
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/code_and_spell_test
          JWT_SECRET: test_secret_for_ci
          CLIENT_URL: http://localhost:5173
          NODE_ENV: test
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Run backend tests
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/code_and_spell_test
          JWT_SECRET: test_secret_for_ci
          CLIENT_URL: http://localhost:5173
          NODE_ENV: test
        run: npm test
